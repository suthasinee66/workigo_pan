<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employer - Confirm Check-in</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
  body { font-family: "Manrope", sans-serif; background-color: #f8f7f5; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400; }
</style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

<div id="container" class="flex flex-col items-center justify-center p-6 bg-white rounded-3xl shadow-lg w-full max-w-sm">
  <div id="statusIcon" class="flex items-center justify-center w-20 h-20 rounded-full bg-gray-200 mb-4">
    <span class="material-symbols-outlined text-5xl text-gray-400">qr_code_scanner</span>
  </div>
  <h1 id="statusText" class="text-xl font-bold text-center mb-2">Scanning QR...</h1>
  <p id="timestamp" class="text-gray-500 text-center mb-4">Please wait</p>
  <button id="backBtn" class="hidden bg-orange-500 text-white py-3 px-6 rounded-xl font-bold">Back</button>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://ispbevvwwggbktfczmui.supabase.co",
  "sb_publishable_5pnSaiKllm-q7UNMe5r7pw_n4Qu-AJ7"
);

const container = document.getElementById("container");
const statusIcon = document.getElementById("statusIcon");
const statusText = document.getElementById("statusText");
const timestamp = document.getElementById("timestamp");
const backBtn = document.getElementById("backBtn");

// ดึง shift_id จาก URL
const urlParams = new URLSearchParams(window.location.search);
const shiftId = urlParams.get("shift_id");

async function checkInShift(shiftId) {
  if (!shiftId) {
    statusText.textContent = "Invalid QR";
    statusIcon.innerHTML = '<span class="material-symbols-outlined text-5xl text-red-600">error</span>';
    backBtn.classList.remove("hidden");
    return;
  }

  // อัปเดต status และ checkin_time ใน shifts
  const { data, error } = await supabase
    .from("shifts")
    .update({
      status: "login",
      checkin_time: new Date()
    })
    .eq("shift_id", shiftId)
    .select()
    .single();

  if (error) {
    console.error(error);
    statusText.textContent = "Check-in failed";
    statusIcon.innerHTML = '<span class="material-symbols-outlined text-5xl text-red-600">error</span>';
    backBtn.classList.remove("hidden");
    return;
  }

  // แสดงผลสำเร็จ
  statusText.textContent = "Check-in Successful";
  timestamp.textContent = `Timestamp: ${new Date(data.checkin_time).toLocaleString()}`;
  statusIcon.innerHTML = '<span class="material-symbols-outlined text-5xl text-green-600">check_circle</span>';
  backBtn.classList.remove("hidden");
}

backBtn.addEventListener("click", () => {
  window.location.href = "/"; // กลับหน้า home หรือ scanner page
});

// เรียกฟังก์ชัน
checkInShift(shiftId);

</script>
</body>
</html>
